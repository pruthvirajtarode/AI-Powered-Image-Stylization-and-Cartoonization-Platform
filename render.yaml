services:
  - type: web
    name: toonify-ai-saas
    env: docker
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000
      - key: DEBUG
        value: "False"
      - key: APP_NAME
        value: Toonify
      - key: SECRET_KEY
        sync: false
      - key: PAYMENT_AMOUNT
        value: "3300"
      - key: PAYMENT_CURRENCY
        value: INR
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SENDER
        sync: false
      - fromDatabase:
          name: toonify-db-v2
          property: internalConnectionString
        key: DATABASE_URL
      - fromDatabase:
          name: toonify-db-v2
          property: internalConnectionString
        key: DATABASE_URI

databases:
  - name: toonify-db-v2
    databaseName: toonify_production
    plan: free
    region: oregon
