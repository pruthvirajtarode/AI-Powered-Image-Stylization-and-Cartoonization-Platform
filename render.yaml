services:
  - type: web
    name: toon-ai-engine
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000
      - key: DEBUG
        value: "False"
      - key: APP_NAME
        value: Toonify
      - key: SECRET_KEY
        sync: false  # Set in Render Dashboard → Environment: use a long random string
      - key: PAYMENT_AMOUNT
        value: "3300"  # INR paise — ₹33
      - key: PAYMENT_CURRENCY
        value: INR
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false  # Set in Render Dashboard → Environment
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SENDER
        sync: false
      - fromDatabase:
          name: toonify-db-new
          property: connectionString
        key: DATABASE_URL

databases:
  - name: toonify-db-new
    databaseName: toonify_production_v1
    plan: free
    region: oregon
